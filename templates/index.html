<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockPulse | Premium Stock Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #10b981;
            --accent-blue: #3b82f6;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at top right, rgba(16, 185, 129, 0.1), transparent),
                              radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.1), transparent);
            padding: 2rem 0;
        }

        .container {
            width: 90%;
            max-width: 800px;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.05em;
        }

        .search-wrapper {
            position: relative;
            margin-bottom: 2rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .search-box {
            width: 100%;
            padding: 1.2rem 1.5rem;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .search-box:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
        }

        .suggestions-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: #1e293b;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
            z-index: 50;
            display: none;
            text-align: left;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .suggestion-item {
            padding: 0.8rem 1.5rem;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:hover {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-color);
        }

        .search-btn {
            margin-top: 1rem;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            max-width: 500px;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
        }

        .result-card {
            margin-top: 2.5rem;
            padding: 2.5rem;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            backdrop-filter: blur(12px);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: left;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 2rem;
        }

        .symbol-tag {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-weight: 700;
            letter-spacing: 0.1em;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        .current-price {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1;
        }

        .chart-container {
            width: 100%;
            height: 350px;
            margin-top: 1rem;
        }

        .error-msg {
            color: #ef4444;
            font-weight: 500;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>StockPulse</h1>

        <form method="POST" id="searchForm">
            <div class="search-wrapper">
                <input type="text" 
                       name="symbol" 
                       id="stockInput" 
                       class="search-box" 
                       placeholder="Enter Stock Symbol (e.g. RELIANCE.NS)" 
                       autocomplete="off" 
                       required>
                <div id="suggestions" class="suggestions-dropdown"></div>
            </div>
            <button type="submit" class="search-btn">Visualize Trends</button>
        </form>

        {% if stock_data %}
            <div class="result-card">
                {% if stock_data.history_dates %}
                    <div class="card-header">
                        <div>
                            <span class="symbol-tag">{{ stock_data.symbol }}</span>
                            <p class="current-price">₹{{ stock_data.price }}</p>
                        </div>
                        <div style="text-align: right">
                            <p style="color: var(--accent-color); font-weight: 600;">Last 30 Days</p>
                            <p style="color: var(--text-secondary); font-size: 0.9rem;">Historical Trend</p>
                        </div>
                    </div>
                    
                    <div class="chart-container">
                        <canvas id="stockChart"></canvas>
                    </div>
                {% else %}
                    <p class="error-msg">{{ stock_data.price }}</p>
                {% endif %}
            </div>
        {% endif %}
    </div>

    <script>
        const input = document.getElementById('stockInput');
        const suggestionsDiv = document.getElementById('suggestions');

        // Suggestion Logic
        input.addEventListener('input', async (e) => {
            const query = e.target.value.trim();
            if (query.length < 1) {
                suggestionsDiv.style.display = 'none';
                return;
            }

            try {
                const response = await fetch(`/suggest?q=${query}`);
                const data = await response.json();

                if (data.length > 0) {
                    suggestionsDiv.innerHTML = data.map(item => `
                        <div class="suggestion-item" onclick="selectSuggestion('${item}')">
                            ${item}
                        </div>
                    `).join('');
                    suggestionsDiv.style.display = 'block';
                } else {
                    suggestionsDiv.style.display = 'none';
                }
            } catch (error) {
                console.error('Error fetching suggestions:', error);
            }
        });

        function selectSuggestion(symbol) {
            input.value = symbol;
            suggestionsDiv.style.display = 'none';
            document.getElementById('searchForm').submit();
        }

        document.addEventListener('click', (e) => {
            if (!input.contains(e.target) && !suggestionsDiv.contains(e.target)) {
                suggestionsDiv.style.display = 'none';
            }
        });

        // Chart Rendering Logic
        {% if stock_data and stock_data.history_dates %}
        const ctx = document.getElementById('stockChart').getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(16, 185, 129, 0.4)');
        gradient.addColorStop(1, 'rgba(16, 185, 129, 0)');

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: {{ stock_data.history_dates | tojson }},
                datasets: [{
                    label: 'Close Price',
                    data: {{ stock_data.history_prices | tojson }},
                    borderColor: '#10b981',
                    borderWidth: 3,
                    pointBackgroundColor: '#10b981',
                    pointBorderColor: 'rgba(255, 255, 255, 0.2)',
                    pointHoverRadius: 6,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: gradient
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#1e293b',
                        titleFont: { size: 14, weight: '600' },
                        bodyFont: { size: 14 },
                        padding: 12,
                        cornerRadius: 10,
                        displayColors: false,
                        callbacks: {
                            label: (context) => `Price: ₹${context.parsed.y}`
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: { 
                            color: '#94a3b8',
                            maxRotation: 0,
                            autoSkip: true,
                            maxTicksLimit: 7
                        }
                    },
                    y: {
                        grid: { color: 'rgba(255, 255, 255, 0.05)' },
                        ticks: { color: '#94a3b8' }
                    }
                }
            }
        });
        {% endif %}
    </script>
</body>
</html>
