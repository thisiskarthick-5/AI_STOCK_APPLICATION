<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockPulse | Premium Stock Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #10b981;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at top right, rgba(16, 185, 129, 0.1), transparent),
                              radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.1), transparent);
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.05em;
        }

        .search-wrapper {
            position: relative;
            margin-bottom: 2rem;
        }

        .search-box {
            width: 100%;
            padding: 1.2rem 1.5rem;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .search-box:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
        }

        .suggestions-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: #1e293b;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
            z-index: 50;
            display: none;
            text-align: left;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .suggestion-item {
            padding: 0.8rem 1.5rem;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:hover {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-color);
        }

        button {
            margin-top: 1rem;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
        }

        .result-card {
            margin-top: 2rem;
            padding: 2rem;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .symbol {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .price {
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .error {
            color: #ef4444;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>StockPulse</h1>

        <form method="POST" id="searchForm">
            <div class="search-wrapper">
                <input type="text" 
                       name="symbol" 
                       id="stockInput" 
                       class="search-box" 
                       placeholder="Search Stock (e.g. TCS)" 
                       autocomplete="off" 
                       required>
                <div id="suggestions" class="suggestions-dropdown"></div>
            </div>
            <button type="submit">View Price</button>
        </form>

        {% if stock_data %}
            <div class="result-card">
                <p class="symbol">{{ stock_data.symbol }}</p>
                {% if stock_data.price is number %}
                    <p class="price">₹{{ stock_data.price }}</p>
                {% else %}
                    <p class="error">{{ stock_data.price }}</p>
                {% endif %}
            </div>
        {% endif %}
    </div>

    <script>
        const input = document.getElementById('stockInput');
        const suggestionsDiv = document.getElementById('suggestions');

        input.addEventListener('input', async (e) => {
            const query = e.target.value.trim();
            if (query.length < 1) {
                suggestionsDiv.style.display = 'none';
                return;
            }

            try {
                const response = await fetch(`/suggest?q=${query}`);
                const data = await response.json();

                if (data.length > 0) {
                    suggestionsDiv.innerHTML = data.map(item => `
                        <div class="suggestion-item" onclick="selectSuggestion('${item}')">
                            ${item}
                        </div>
                    `).join('');
                    suggestionsDiv.style.display = 'block';
                } else {
                    suggestionsDiv.style.display = 'none';
                }
            } catch (error) {
                console.error('Error fetching suggestions:', error);
            }
        });

        function selectSuggestion(symbol) {
            input.value = symbol;
            suggestionsDiv.style.display = 'none';
            document.getElementById('searchForm').submit();
        }

        // Hide suggestions when clicking outside
        document.addEventListener('click', (e) => {
            if (!input.contains(e.target) && !suggestionsDiv.contains(e.target)) {
                suggestionsDiv.style.display = 'none';
            }
        });
    </script>
</body>
</html>
